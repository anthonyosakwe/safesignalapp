# Auto-update the bundled Supabase JS SDK weekly.
#
# This workflow checks npm every Monday for a new release of @supabase/supabase-js
# (within major version 2), downloads the UMD bundle, and commits it back to the repo
# if it has changed. GitHub Pages will then redeploy automatically.
#
# Why pin to major v2: Supabase follows semver, so any breaking change ships at v3+.
# Staying within v2 means you get bug fixes and patch releases without surprise breakage.
# When v3 lands and you want to migrate, bump the version constraint manually.

name: Update Supabase SDK

on:
  # Run every Monday at 03:00 UTC (04:00 WAT — quiet time in Nigeria)
  schedule:
    - cron: '0 3 * * 1'
  # Allow manual trigger from the Actions tab whenever you want to force a check
  workflow_dispatch:

# Minimum permissions needed: read the repo, write the updated file back, push commits
permissions:
  contents: write

jobs:
  update-sdk:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Fetch latest Supabase SDK (v2.x)
        id: fetch
        run: |
          set -e

          # Query npm for the latest version that satisfies ^2 (any v2.x.x release)
          LATEST_VERSION=$(curl -sf https://registry.npmjs.org/@supabase/supabase-js | \
            python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          # Get all v2.x.x versions, sorted, take the latest
          v2_versions = [v for v in data['versions'].keys() if v.startswith('2.')]
          v2_versions.sort(key=lambda s: [int(p) for p in s.split('-')[0].split('.')])
          print(v2_versions[-1])
          ")

          echo "Latest v2 SDK version: $LATEST_VERSION"
          echo "version=$LATEST_VERSION" >> "$GITHUB_OUTPUT"

          # Download the UMD bundle for that exact version
