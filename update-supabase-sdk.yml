# Auto-update the bundled Supabase JS SDK weekly.
#
# This workflow checks npm every Monday for a new release of @supabase/supabase-js
# (within major version 2), downloads the UMD bundle, and commits it back to the repo
# if it has changed. GitHub Pages will then redeploy automatically.
#
# Why pin to major v2: Supabase follows semver, so any breaking change ships at v3+.
# Staying within v2 means you get bug fixes and patch releases without surprise breakage.
# When v3 lands and you want to migrate, bump the version constraint manually.

name: Update Supabase SDK

on:
  # Run every Monday at 03:00 UTC (04:00 WAT — quiet time in Nigeria)
  schedule:
    - cron: '0 3 * * 1'
  # Allow manual trigger from the Actions tab whenever you want to force a check
  workflow_dispatch:

# Minimum permissions needed: read the repo, write the updated file back, push commits
permissions:
  contents: write

jobs:
  update-sdk:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Fetch latest Supabase SDK (v2.x)
        id: fetch
        run: |
          set -e

          # Query npm for the latest version that satisfies ^2 (any v2.x.x release)
          LATEST_VERSION=$(curl -sf https://registry.npmjs.org/@supabase/supabase-js | \
            python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          # Get all v2.x.x versions, sorted, take the latest
          v2_versions = [v for v in data['versions'].keys() if v.startswith('2.')]
          v2_versions.sort(key=lambda s: [int(p) for p in s.split('-')[0].split('.')])
          print(v2_versions[-1])
          ")

          echo "Latest v2 SDK version: $LATEST_VERSION"
          echo "version=$LATEST_VERSION" >> "$GITHUB_OUTPUT"

          # Download the UMD bundle for that exact version
          DOWNLOAD_URL="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@${LATEST_VERSION}/dist/umd/supabase.js"
          echo "Downloading from: $DOWNLOAD_URL"

          # Download to a temp file first; only replace if download succeeded and file is non-trivial
          curl -sfL "$DOWNLOAD_URL" -o supabase.js.new

          # Sanity check: file should be >50KB. If smaller, something's wrong (404 page, etc).
          SIZE=$(stat -c%s supabase.js.new)
          if [ "$SIZE" -lt 50000 ]; then
            echo "❌ Downloaded file is suspiciously small ($SIZE bytes). Aborting."
            exit 1
          fi

          # Quick sanity: file should contain the Supabase namespace export
          if ! grep -q "createClient" supabase.js.new; then
            echo "❌ Downloaded file does not contain expected Supabase exports. Aborting."
            exit 1
          fi

          mv supabase.js.new supabase.js
          echo "✓ Downloaded supabase.js ($SIZE bytes)"

      - name: Check whether file actually changed
        id: diff
        run: |
          if git diff --quiet supabase.js; then
            echo "No changes — already on latest"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "supabase.js has been updated"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push update
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add supabase.js
          git commit -m "chore: bump Supabase SDK to v${{ steps.fetch.outputs.version }}

          Auto-updated by .github/workflows/update-supabase-sdk.yml
          See https://github.com/supabase/supabase-js/releases for changelog."
          git push

      - name: Summary
        run: |
          if [ "${{ steps.diff.outputs.changed }}" = "true" ]; then
            echo "✅ Updated supabase.js to v${{ steps.fetch.outputs.version }}"
          else
            echo "✅ Already on latest v${{ steps.fetch.outputs.version }} — nothing to do"
          fi
